<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SB Barber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --grey: #1a1a1a;
      --mid: #2a2a2a;
      --accent: #f5f5f0;
      --muted: #666;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 48px 20px 40px;
      position: relative;
      overflow-x: hidden;
    }

    /* Grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* Subtle radial glow top */
    body::after {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    /* ── LOGO / AVATAR ── */
    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: var(--grey);
      overflow: hidden;
      margin-bottom: 18px;
      animation: fadeDown 0.6s ease both;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── HEADER ── */
    .brand {
      text-align: center;
      margin-bottom: 6px;
      animation: fadeDown 0.6s ease 0.08s both;
    }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 3px;
      line-height: 1;
      color: var(--white);
    }

    .brand-tagline {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 300;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: rgba(255,255,255,0.12);
      margin: 20px auto 28px;
      animation: fadeIn 0.6s ease 0.15s both;
    }

    /* ── LINKS ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 18px 22px;
      border-radius: 14px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.08);
      background: var(--grey);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    .link-btn:hover {
      background: var(--mid);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-1px);
    }

    .link-btn:active {
      transform: translateY(0px) scale(0.99);
    }

    /* Primary CTA — "Pedí tu turno" */
    .link-btn.primary {
      background: var(--white);
      border-color: var(--white);
      color: var(--black);
      padding: 20px 22px;
      animation: cta-pulse 2.4s ease-in-out infinite;
    }

    @keyframes cta-pulse {
      0%, 100% {
        transform: translateY(0) scale(1);
        box-shadow: 0 0 0 0 rgba(255,255,255,0.35);
      }
      50% {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 8px 24px 0 rgba(255,255,255,0.18);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .link-btn.primary { animation: none; }
    }

    .link-btn.primary:hover {
      background: #e8e8e3;
      border-color: #e8e8e3;
      animation-play-state: paused;
    }

    .link-btn.primary .icon-wrap {
      background: rgba(0,0,0,0.08);
      color: var(--black);
    }

    .link-btn.primary .arrow {
      color: rgba(0,0,0,0.4);
    }

    .icon-wrap {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-wrap svg {
      width: 20px;
      height: 20px;
    }

    .link-text {
      flex: 1;
    }

    .link-label {
      display: block;
      font-size: 15px;
      font-weight: 500;
    }

    .link-sub {
      display: block;
      font-size: 11.5px;
      font-weight: 300;
      opacity: 0.45;
      margin-top: 2px;
      letter-spacing: 0.2px;
    }

    .arrow {
      color: rgba(255,255,255,0.25);
      flex-shrink: 0;
    }

    /* Staggered animations */
    .link-btn:nth-child(1) { animation: fadeUp 0.5s ease 0.2s both; }
    .link-btn:nth-child(2) { animation: fadeUp 0.5s ease 0.28s both; }
    .link-btn:nth-child(3) { animation: fadeUp 0.5s ease 0.36s both; }
    .link-btn:nth-child(4) { animation: fadeUp 0.5s ease 0.44s both; }
    .link-btn:nth-child(5) { animation: fadeUp 0.5s ease 0.52s both; }

    /* ── FOOTER ── */
    .footer {
      margin-top: 40px;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: fadeIn 0.8s ease 0.8s both;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
