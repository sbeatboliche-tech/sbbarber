<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SB BARBER — Recepción</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/jpeg" href="https://i.imgur.com/PzcD4W2.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family:'Inter',sans-serif; -webkit-tap-highlight-color:transparent; }
        ::-webkit-scrollbar { display:none; }
        .glass { background:rgba(17,24,39,0.85); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,0.08); }
        .glass-card { background:rgba(30,41,59,0.7); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.05); box-shadow:0 8px 32px rgba(0,0,0,0.4); }
        .glass-modal { background:rgba(20,25,35,0.97); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); }
        .animate-enter { animation:enter 0.35s cubic-bezier(0.16,1,0.3,1); }
        @keyframes enter { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .stock-low { animation:pulse-red 2s infinite; }
        @keyframes pulse-red { 0%,100%{border-color:rgba(239,68,68,0.4)} 50%{border-color:rgba(239,68,68,0.9)} }
        body { padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); }
        button:disabled { opacity:0.7; cursor:not-allowed; }
    </style>
</head>
<body class="h-full bg-[#0f1115] text-white flex items-center justify-center">
<div class="w-full max-w-md h-full flex flex-col relative shadow-2xl overflow-hidden">

    <!-- Loading -->
    <div id="loading-view" class="absolute inset-0 z-50 bg-[#0f1115] flex flex-col justify-center items-center transition-opacity duration-500">
        <img src="https://i.imgur.com/xyjMT6X.png" alt="SB BARBER" class="h-24 mb-6 animate-pulse drop-shadow-[0_0_15px_rgba(255,255,255,0.1)]">
        <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-cyan-500"></div>
    </div>

    <!-- Login -->
    <div id="login-view" class="flex-1 flex flex-col justify-center p-8 hidden">
        <div class="text-center mb-10">
            <img src="https://i.imgur.com/xyjMT6X.png" alt="SB BARBER" class="h-32 mx-auto mb-6 drop-shadow-2xl">
            <h1 class="text-2xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-teal-400">RECEPCIÓN</h1>
        </div>
        <form id="login-form" class="space-y-4">
            <input type="email" id="login-email" placeholder="Correo electrónico" class="w-full p-4 bg-black/40 rounded-xl border border-gray-700 focus:border-cyan-500 outline-none transition text-white placeholder-gray-500" required>
            <input type="password" id="login-password" placeholder="Contraseña" class="w-full p-4 bg-black/40 rounded-xl border border-gray-700 focus:border-cyan-500 outline-none transition text-white placeholder-gray-500" required>
            <button type="submit" class="w-full bg-gradient-to-r from-cyan-600 to-teal-600 p-4 rounded-xl font-bold text-lg shadow-lg hover:scale-[1.02] transition text-white uppercase tracking-wider">Ingresar</button>
        </form>
        <p id="login-error" class="hidden text-center text-red-400 text-sm mt-4">Correo o contraseña incorrectos.</p>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-view" class="flex-1 flex flex-col hidden h-full">

        <!-- Header -->
        <header class="px-5 py-4 glass sticky top-0 z-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://i.imgur.com/xyjMT6X.png" alt="Logo" class="h-9 w-auto object-contain">
                <div>
                    <h1 class="text-sm font-bold text-white leading-none tracking-wider">SB BARBER</h1>
                    <span class="text-[10px] text-cyan-400 font-medium">Recepción</span>
                </div>
            </div>
            <button onclick="window.logout()" class="w-9 h-9 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-red-400 transition">
                <i class="fas fa-power-off text-xs"></i>
            </button>
        </header>

        <!-- Contenido -->
        <div class="flex-1 overflow-y-auto p-4 pb-28 space-y-4">

            <!-- Resumen stock -->
            <div class="glass-card rounded-2xl p-5 animate-enter">
                <span class="text-gray-400 text-xs font-bold uppercase tracking-wider flex items-center gap-2 mb-3">
                    <i class="fas fa-wine-bottle text-cyan-400"></i> Stock de Bebidas
                </span>
                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-black/30 rounded-xl p-3 text-center">
                        <div id="stat-total-items" class="text-2xl font-extrabold text-white">0</div>
                        <div class="text-[10px] text-gray-500 mt-0.5">productos</div>
                    </div>
                    <div class="bg-black/30 rounded-xl p-3 text-center">
                        <div id="stat-total-units" class="text-2xl font-extrabold text-cyan-300">0</div>
                        <div class="text-[10px] text-gray-500 mt-0.5">unidades</div>
                    </div>
                    <div class="bg-black/30 rounded-xl p-3 text-center">
                        <div id="stat-low-stock" class="text-2xl font-extrabold text-red-400">0</div>
                        <div class="text-[10px] text-gray-500 mt-0.5">stock bajo</div>
                    </div>
                </div>
            </div>

            <!-- Lista de stock -->
            <div class="glass-card rounded-2xl p-5 animate-enter">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-bold text-white">Inventario</h3>
                    <button id="btn-add-item" onclick="window.openAddItemModal()" class="bg-cyan-700/40 border border-cyan-500/30 text-cyan-400 text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-cyan-700/60 transition flex items-center gap-1.5">
                        <i class="fas fa-plus text-[10px]"></i> Agregar
                    </button>
                </div>
                <div id="stock-list" class="space-y-2">
                    <p class="text-xs text-gray-600 text-center py-6">Cargando...</p>
                </div>
            </div>

        </div>

        <!-- FAB: Venta rápida -->
        <button onclick="window.openQuickSaleModal()" class="absolute bottom-6 right-6 w-16 h-16 bg-gradient-to-tr from-cyan-600 to-teal-500 rounded-full shadow-[0_0_25px_rgba(6,182,212,0.5)] flex items-center justify-center text-xl text-white transition-all active:scale-90 hover:scale-105 z-30 border-2 border-white/10">
            <i class="fas fa-minus"></i>
        </button>

    </div>

    <!-- Modal: Agregar bebida -->
    <div id="add-item-modal" class="absolute inset-0 bg-black/90 backdrop-blur-sm z-50 hidden flex-col justify-end sm:justify-center animate-enter">
        <div class="glass-modal sm:rounded-3xl sm:max-w-sm sm:mx-auto w-full border-t sm:border border-white/10 p-6 shadow-2xl rounded-t-3xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white">Agregar Bebida</h2>
                <button onclick="window.closeModals()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-gray-400"><i class="fas fa-times"></i></button>
            </div>
            <form id="add-item-form" class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Nombre</label>
                    <input type="text" id="new-item-name" placeholder="Ej: Coca Cola, Agua, Cerveza..." required class="w-full p-4 bg-black/40 rounded-xl border border-gray-700 focus:border-cyan-500 outline-none transition text-white placeholder-gray-500 mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Cantidad inicial</label>
                    <input type="number" id="new-item-qty" placeholder="0" min="1" required class="w-full p-4 bg-black/40 rounded-xl border border-gray-700 focus:border-cyan-500 outline-none transition text-white placeholder-gray-500 mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Precio unitario (opcional)</label>
                    <input type="number" id="new-item-price" placeholder="0" class="w-full p-4 bg-black/40 rounded-xl border border-gray-700 focus:border-cyan-500 outline-none transition text-white placeholder-gray-500 mt-1">
                </div>
                <button type="submit" id="btn-submit-add" class="w-full bg-gradient-to-r from-cyan-600 to-teal-600 text-white p-4 rounded-xl font-bold text-lg shadow-lg uppercase tracking-widest">Agregar</button>
            </form>
        </div>
    </div>

    <!-- Modal: Movimiento (compra o venta) -->
    <div id="movement-modal" class="absolute inset-0 bg-black/90 backdrop-blur-sm z-50 hidden flex-col justify-end sm:justify-center animate-enter">
        <div class="glass-modal sm:rounded-3xl sm:max-w-sm sm:mx-auto w-full border-t sm:border border-white/10 p-6 shadow-2xl rounded-t-3xl">
            <div class="flex justify-between items-center mb-2">
                <h2 id="movement-title" class="text-xl font-bold text-white">Movimiento</h2>
                <button onclick="window.closeModals()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-gray-400"><i class="fas fa-times"></i></button>
            </div>
            <p id="movement-subtitle" class="text-xs text-gray-500 mb-6"></p>
            <form id="movement-form" class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1" id="movement-qty-label">Cantidad</label>
                    <input type="number" id="movement-qty" placeholder="0" min="1" required class="w-full p-4 bg-black/40 rounded-xl border border-gray-700 focus:border-cyan-500 outline-none transition text-white placeholder-gray-500 mt-1">
                </div>
                <button type="submit" id="btn-submit-movement" class="w-full text-white p-4 rounded-xl font-bold text-lg shadow-lg uppercase tracking-widest">Confirmar</button>
            </form>
        </div>
    </div>

    <!-- Modal: Venta rápida (FAB) -->
    <div id="quick-sale-modal" class="absolute inset-0 bg-black/90 backdrop-blur-sm z-50 hidden flex-col justify-end sm:justify-center animate-enter">
        <div class="glass-modal sm:rounded-3xl sm:max-w-sm sm:mx-auto w-full border-t sm:border border-white/10 p-6 shadow-2xl rounded-t-3xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white"><i class="fas fa-bolt text-cyan-400 mr-2"></i>Venta Rápida</h2>
                <button onclick="window.closeModals()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-gray-400"><i class="fas fa-times"></i></button>
            </div>
            <div id="quick-sale-list" class="space-y-2 max-h-72 overflow-y-auto mb-4"></div>
            <p class="text-[10px] text-gray-600 text-center">Tocá una bebida para descontar 1 unidad</p>
        </div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, updateDoc, deleteDoc, doc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAXUQmV19Z0VNbOlrrk_IcMc2GKQZ8yk7w",
    authDomain: "sb-barber-6dc16.firebaseapp.com",
    projectId: "sb-barber-6dc16",
    storageBucket: "sb-barber-6dc16.firebasestorage.app",
    messagingSenderId: "213501157745",
    appId: "1:213501157745:web:09fd59996cf1d72b6696d0"
};

const ADMINS = ['abalo7272@gmail.com', 'carusomanu21@gmail.com'];
const PATH_STOCK = 'stock_items';

let app, auth, db, currentUser;
let allStock = [];
let currentMovement = null;
let isAdmin = false;

async function init() {
    app = initializeApp(firebaseConfig);
    auth = getAuth(app);
    db = getFirestore(app);
    await setPersistence(auth, browserLocalPersistence);

    onAuthStateChanged(auth, user => {
        if (user) {
            currentUser = user;
            isAdmin = ADMINS.includes(user.email);
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('login-view').classList.add('hidden');
            // Solo admins pueden agregar nuevas bebidas
            if (!isAdmin) document.getElementById('btn-add-item').classList.add('hidden');
            listenToStock();
        } else {
            document.getElementById('loading-view').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('login-view').classList.remove('hidden');
        }
    });
}

function listenToStock() {
    onSnapshot(query(collection(db, PATH_STOCK), orderBy('name', 'asc')), snap => {
        allStock = snap.docs.map(d => ({ ...d.data(), id: d.id }));
        renderStock();
        document.getElementById('loading-view').classList.add('opacity-0', 'pointer-events-none');
    });
}

function renderStock() {
    // Stats
    const totalUnits = allStock.reduce((s, i) => s + (i.quantity || 0), 0);
    const lowCount = allStock.filter(i => (i.quantity || 0) <= 2).length;
    document.getElementById('stat-total-items').textContent = allStock.length;
    document.getElementById('stat-total-units').textContent = totalUnits;
    document.getElementById('stat-low-stock').textContent = lowCount;

    const list = document.getElementById('stock-list');
    if (allStock.length === 0) {
        list.innerHTML = '<p class="text-xs text-gray-600 text-center py-6">No hay bebidas cargadas aún</p>';
        return;
    }

    list.innerHTML = allStock.map(item => {
        const qty = item.quantity || 0;
        const isLow = qty <= 2;
        const qtyColor = qty === 0 ? 'text-red-400' : isLow ? 'text-yellow-400' : 'text-cyan-300';
        const border = isLow ? 'border-red-500/40 stock-low' : 'border-cyan-500/10';
        const deleteBtn = isAdmin
            ? `<button onclick="window.deleteItem('${item.id}')" class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-600 hover:text-red-400 transition"><i class="fas fa-trash text-xs"></i></button>`
            : '';
        return `
        <div class="flex items-center justify-between bg-black/30 p-3 rounded-xl border ${border}">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-cyan-900/30 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-wine-bottle text-cyan-400 text-xs"></i>
                </div>
                <div>
                    <div class="text-sm font-bold text-white">${item.name}</div>
                    ${item.price ? `<div class="text-[10px] text-gray-500">$${Number(item.price).toLocaleString('es-AR')} c/u</div>` : ''}
                    ${isLow && qty > 0 ? '<div class="text-[10px] text-yellow-500 font-bold">Stock bajo</div>' : ''}
                    ${qty === 0 ? '<div class="text-[10px] text-red-500 font-bold">Sin stock</div>' : ''}
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="text-center mr-1">
                    <div class="${qtyColor} font-bold text-xl leading-none">${qty}</div>
                    <div class="text-[9px] text-gray-600">unid.</div>
                </div>
                <button onclick="window.openMovement('${item.id}','${item.name}','compra')" class="w-8 h-8 rounded-lg bg-emerald-600/20 border border-emerald-500/30 flex items-center justify-center text-emerald-400 hover:bg-emerald-600/40 transition" title="Compra">
                    <i class="fas fa-plus text-xs"></i>
                </button>
                <button onclick="window.openMovement('${item.id}','${item.name}','venta')" class="w-8 h-8 rounded-lg bg-red-600/20 border border-red-500/30 flex items-center justify-center text-red-400 hover:bg-red-600/40 transition" title="Venta">
                    <i class="fas fa-minus text-xs"></i>
                </button>
                ${deleteBtn}
            </div>
        </div>`;
    }).join('');
}

// Movimiento (compra o venta)
window.openMovement = (itemId, itemName, type) => {
    currentMovement = { itemId, itemName, type };
    const isCompra = type === 'compra';
    document.getElementById('movement-title').textContent = isCompra ? `Compra — ${itemName}` : `Venta — ${itemName}`;
    document.getElementById('movement-subtitle').textContent = isCompra ? 'Ingresá la cantidad que llegó al local' : 'Ingresá la cantidad que se vendió';
    document.getElementById('movement-qty-label').textContent = isCompra ? 'Cantidad comprada' : 'Cantidad vendida';
    const btn = document.getElementById('btn-submit-movement');
    btn.textContent = isCompra ? 'REGISTRAR COMPRA' : 'REGISTRAR VENTA';
    btn.className = `w-full text-white p-4 rounded-xl font-bold text-lg shadow-lg uppercase tracking-widest bg-gradient-to-r ${isCompra ? 'from-emerald-600 to-teal-600' : 'from-red-600 to-rose-600'}`;
    document.getElementById('movement-qty').value = '';
    showModal('movement-modal');
};

document.getElementById('movement-form').addEventListener('submit', async e => {
    e.preventDefault();
    const qty = Number(document.getElementById('movement-qty').value);
    if (!qty || qty < 1) return alert('Ingresá una cantidad válida');
    const btn = document.getElementById('btn-submit-movement');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    try {
        const delta = currentMovement.type === 'compra' ? qty : -qty;
        await updateDoc(doc(db, PATH_STOCK, currentMovement.itemId), { quantity: increment(delta) });
        closeModals();
    } catch { alert('Error al guardar'); }
    btn.disabled = false;
    btn.textContent = currentMovement.type === 'compra' ? 'REGISTRAR COMPRA' : 'REGISTRAR VENTA';
});

// Agregar nueva bebida (solo admins)
window.openAddItemModal = () => {
    document.getElementById('add-item-form').reset();
    showModal('add-item-modal');
};

document.getElementById('add-item-form').addEventListener('submit', async e => {
    e.preventDefault();
    const name = document.getElementById('new-item-name').value.trim();
    const qty = Number(document.getElementById('new-item-qty').value);
    const price = Number(document.getElementById('new-item-price').value) || 0;
    if (!name || !qty) return alert('Completá nombre y cantidad');
    const btn = document.getElementById('btn-submit-add');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    try {
        await addDoc(collection(db, PATH_STOCK), { name, quantity: qty, price, createdAt: serverTimestamp() });
        closeModals();
    } catch { alert('Error al guardar'); }
    btn.disabled = false; btn.textContent = 'AGREGAR';
});

// Venta rápida (FAB -)
window.openQuickSaleModal = () => {
    const list = document.getElementById('quick-sale-list');
    const withStock = allStock.filter(i => (i.quantity || 0) > 0);
    if (withStock.length === 0) {
        list.innerHTML = '<p class="text-xs text-gray-500 text-center py-4">No hay bebidas con stock disponible</p>';
    } else {
        list.innerHTML = withStock.map(item => `
            <button onclick="window.quickSale('${item.id}','${item.name}')" class="w-full flex items-center justify-between bg-black/30 p-4 rounded-xl border border-cyan-500/10 hover:border-cyan-500/40 hover:bg-cyan-900/20 transition text-left">
                <span class="font-bold text-white text-sm">${item.name}</span>
                <span class="text-cyan-300 font-bold text-lg">${item.quantity || 0} <span class="text-[10px] text-gray-500 font-normal">unid.</span></span>
            </button>`).join('');
    }
    showModal('quick-sale-modal');
};

window.quickSale = async (itemId, itemName) => {
    const item = allStock.find(i => i.id === itemId);
    if (!item || (item.quantity || 0) < 1) return alert('Sin stock disponible');
    try {
        await updateDoc(doc(db, PATH_STOCK, itemId), { quantity: increment(-1) });
        closeModals();
    } catch { alert('Error al registrar la venta'); }
};

// Eliminar (solo admins)
window.deleteItem = async (itemId) => {
    if (!confirm('¿Eliminar esta bebida del inventario?')) return;
    try { await deleteDoc(doc(db, PATH_STOCK, itemId)); }
    catch { alert('Error al eliminar'); }
};

// Auth
document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const errEl = document.getElementById('login-error');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    errEl.classList.add('hidden');
    try {
        await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
    } catch {
        errEl.classList.remove('hidden');
    }
    btn.disabled = false; btn.innerHTML = 'INGRESAR';
});

window.logout = () => signOut(auth);

function showModal(id) {
    document.getElementById(id).classList.remove('hidden');
    document.getElementById(id).classList.add('flex', 'flex-col');
}
function closeModals() {
    ['add-item-modal', 'movement-modal', 'quick-sale-modal'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
        document.getElementById(id).classList.remove('flex', 'flex-col');
    });
}
window.closeModals = closeModals;

init();
</script>
</body>
</html>
